<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黃大仙靈籤 - 粉彩東方古典風</title>
    <!-- 引入 PWA 相關設定檔 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#8EAE9D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root {
            /* Pastel Eastern Color Palette (粉彩東方色系) */
            --bg-color: #F7F5F0;         /* 宣紙溫潤米白 */
            --container-bg: #FFFFFF;     /* 羊脂白 */
            --primary-pastel: #8EAE9D;   /* 豆綠/粉彩青瓷 */
            --secondary-pastel: #D3A29D; /* 絲絹粉/胭脂粉 */
            --accent-gold: #C5A059;      /* 古典霧面金 */
            --text-dark: #4A4A4A;        /* 墨灰深色 */
            --text-light: #6A6A6A;       /* 墨灰次要文字 */
            --border-color: #E6E1D6;     /* 柔和邊框色 */
            --luck-bg: #F4EBE8;          /* 籤運標籤底色 */
            --cat-bg: #EEF3F0;           /* 分類按鈕底色 */
        }

        body {
            font-family: "PingFang HK", "Microsoft JhengHei", "Noto Serif TC", serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(#E6E1D6 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            max-width: 680px;
            width: 100%;
            background-color: var(--container-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        /* 東方風格古典邊框角綴 (無燈籠) */
        .container::before, .container::after {
            content: "☁";
            font-size: 24px;
            color: var(--primary-pastel);
            position: absolute;
            top: 15px;
            opacity: 0.5;
        }
        .container::before { left: 20px; }
        .container::after { right: 20px; transform: scaleX(-1); }

        h1 {
            color: var(--text-dark);
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--primary-pastel);
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 按鈕區域 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .btn {
            border: none;
            padding: 16px 35px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 3px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        /* 求籤按鈕 */
        .draw-btn {
            background-color: var(--primary-pastel);
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(142, 174, 157, 0.3);
        }

        .draw-btn:hover {
            background-color: #7A9A89;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(142, 174, 157, 0.4);
        }

        /* 重設按鈕 */
        .reset-btn {
            background-color: var(--secondary-pastel);
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(211, 162, 157, 0.3);
            display: none; /* 初始隱藏，抽籤後顯示 */
            animation: fadeIn 0.5s ease-in-out;
        }

        .reset-btn:hover {
            background-color: #C08E89;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(211, 162, 157, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* 簽文內容顯示區 */
        .result-box {
            border-top: 1px dashed var(--border-color);
            padding-top: 30px;
            display: none; /* 初始隱藏 */
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lot-number {
            font-size: 18px;
            color: var(--accent-gold);
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .lot-title {
            font-size: 26px;
            color: var(--text-dark);
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .lot-luck {
            display: inline-block;
            background-color: var(--luck-bg);
            color: var(--secondary-pastel);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 25px;
            letter-spacing: 2px;
            border: 1px solid rgba(211, 162, 157, 0.3);
        }

        .poem-box {
            background-color: var(--bg-color);
            border-left: 4px solid var(--primary-pastel);
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
            text-align: left;
        }

        .poem-text {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-dark);
            margin-bottom: 15px;
            font-weight: 500;
            text-align: center;
        }

        .poem-translation {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-light);
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 分類解讀選擇區 */
        .cat-title {
            font-size: 15px;
            color: var(--text-dark);
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .cat-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .cat-btn {
            background-color: var(--cat-bg);
            color: var(--text-dark);
            border: 1px solid var(--primary-pastel);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .cat-btn:hover, .cat-btn.active {
            background-color: var(--primary-pastel);
            color: #FFFFFF;
            transform: scale(1.05);
        }

        /* 分類解讀說明方塊 */
        .explanation-box {
            background-color: #FFFDF9;
            border: 1px solid var(--accent-gold);
            border-radius: 8px;
            padding: 20px;
            text-align: left;
            display: none; /* 點擊選項後顯示 */
            animation: fadeIn 0.4s ease-in-out;
        }

        .exp-category-name {
            color: var(--accent-gold);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            border-bottom: 1px dashed var(--accent-gold);
            padding-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .exp-text-zh {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .exp-text-en {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .instructions {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .btn-group { flex-direction: column; gap: 10px; }
            .btn { width: 100%; padding: 14px 0; }
            .lot-title { font-size: 22px; }
            .poem-text { font-size: 16px; }
            .cat-grid { gap: 8px; }
            .cat-btn { padding: 6px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>黃大仙靈籤</h1>
    <div class="subtitle">Wong Tai Sin Fortune Sticks</div>
    
    <p class="instructions">請默念您的問題，然後點擊下方按鈕誠心求籤。<br>Focus on your question and click the button below to draw a stick.</p>
    
    <div class="btn-group">
        <button class="btn draw-btn" onclick="drawLot()">誠心求籤</button>
        <button class="btn reset-btn" id="reset-btn" onclick="resetLot()">重設 / Reset</button>
    </div>

    <div class="result-box" id="result-box">
        <div class="lot-number" id="lot-number"></div>
        <div class="lot-title" id="lot-title"></div>
        <div class="lot-luck" id="lot-luck"></div>
        
        <div class="poem-box">
            <div class="poem-text" id="poem-text"></div>
            <div class="poem-translation" id="poem-translation"></div>
        </div>

        <div class="cat-title">✦ 選擇所求事項以查閱詳細解讀 · Select a category for detailed interpretation ✦</div>
        <div class="cat-grid">
            <button class="cat-btn" onclick="showExplanation('career', this)">事業 · Career</button>
            <button class="cat-btn" onclick="showExplanation('wealth', this)">財運 · Wealth</button>
            <button class="cat-btn" onclick="showExplanation('love', this)">姻緣 · Love</button>
            <button class="cat-btn" onclick="showExplanation('health', this)">健康 · Health</button>
            <button class="cat-btn" onclick="showExplanation('study', this)">學業 · Study</button>
            <button class="cat-btn" onclick="showExplanation('family', this)">家庭 · Family</button>
        </div>

        <div class="explanation-box" id="explanation-box">
            <div class="exp-category-name">
                <span id="exp-title">事業解讀</span>
                <span id="exp-luck-badge" style="font-size:14px; font-weight:normal;"></span>
            </div>
            <div class="exp-text-zh" id="exp-zh"></div>
            <div class="exp-text-en" id="exp-en"></div>
        </div>
    </div>
</div>

<script>
    // 100 支簽資料庫與對應解讀
    const lotsData = [
        { no: 1, luck: "上上籤", title: "姜公封相", poem: "靈籤求得第一枝，龍虎風雲際會時。<br>一旦凌霄揚自樂，任君來往赴瑤池。", trans: "Having drawn the very first fortune stick, it signifies the convergence of dragons and tigers under shifting winds and clouds. Once soaring high into the clouds to enjoy self-mattered joy, you are free to travel back and forth to the Jade Pool." },
        { no: 2, luck: "上吉籤", title: "王道真誤入桃源", poem: "枯木逢春盡發新，花香葉茂蝶來頻。<br>桃源競鬥千紅紫，一葉漁舟誤入津。", trans: "Dead wood meets the spring and fully rejuvenates; with fragrant flowers and lush leaves, butterflies visit frequently. In the Peach Blossom Spring, thousands of reds and purples compete in brilliance, as a single fishing boat mistakenly enters the ferry." },
        { no: 3, luck: "中平籤", title: "魯班伐木", poem: "牛馬同欄命不相同，一個辛勤一個慵。<br>若問木匠施巧妙，何如劈碎作柴燒。", trans: "Cattle and horses share the same stable but have different destinies; one labors diligently while the other remains lazy. If you ask the carpenter to apply his clever skill, it is better to split it up to burn as firewood." },
        { no: 4, luck: "中吉籤", title: "燕子教飛", poem: "清明時節雨紛紛，莫向人家好問墳。<br>借問酒家何處有，牧童遙指杏花村。", trans: "Drizzling rain falls heavily during the Qingming Festival; do not look around to ask about ancestral graves. Asking where a tavern might be found, the shepherd boy points afar to the Apricot Blossom Village." },
        { no: 5, luck: "中吉籤", title: "陶淵明栽花", poem: "東園昨夜狂風急，萬紫千紅亦播遷。<br>幸有惜花人早起，培回根本復栽生。", trans: "A fierce gale blew wildly through the eastern garden last night, scattering thousands of purples and reds. Fortunately, a flower-cherishing person woke up early to nourish the roots and replant them back to life." },
        { no: 6, luck: "上吉籤", title: "蘇東坡遊滕王閣", poem: "一片孤帆萬里回，管弦嘔啞且停杯。<br>如雲勝友談風月，暢敘幽情極樂哉。", trans: "A single lonely sail returns from ten thousand miles away; stop the cup amidst the rough sounds of strings and flutes. Excellent friends gather like clouds to talk of wind and moon, joyfully conversing with deep feelings in absolute bliss." },
        { no: 7, luck: "中平籤", title: "丁山射雁", poem: "秋來征雁向南歸，紅葉紛紛滿院飛。<br>碪搗城頭聲切耳，江楓如火在漁磯。", trans: "As autumn arrives, migratory geese fly southward, and red leaves flutter wildly to fill the courtyard. The sound of pounding pestles on the city wall strikes the ear sharply, while river maples burn like fire by the fishing pier." },
        { no: 8, luck: "下下籤", title: "鵲巢鳩居", poem: "鳴鳩爭奪鵲巢居，賓主參差意不舒。<br>滿嶺喬松蘿蔦附，且猜詩語是何如。", trans: "The calling dove fights to capture the magpie's nest; guest and host are misaligned, causing uneasy feelings. The entire ridge of tall pines is overrun by clinging vines; try to guess what these poetic words imply." },
        { no: 9, luck: "上吉籤", title: "陶淵明賞菊", poem: "為愛幽閒多種竹，買春賞雨在茅屋。<br>醉時臥倒杏花邊，怕聽鶯兒驚夢熟。", trans: "Out of love for quiet leisure, many bamboos are planted; buying spring wine and admiring rain inside a thatched hut. When drunk, lying down beside the apricot blossoms, fearing to hear the orioles awaken a deep dream." },
        { no: 10, luck: "Micro 中平籤", title: "蘇秦不第", poem: "一輪月鏡掛空中，偶被浮雲障疊重。<br>玉匣何時光氣吐，誰人借我一狂風。", trans: "A round mirror of a moon hangs in the sky, occasionally obscured by overlapping layers of floating clouds. When will the jade box unleash its radiant aura? Who will lend me a wild gust of wind?" },
        { no: 11, luck: "上吉籤", title: "漢文帝賞柳", poem: "楊柳垂堤鎖綠煙，日長三起又三眠。<br>往來紫燕紛飛舞，裊娜迎風倩我憐。", trans: "Willows drooping along the embankment lock in the green mist; during the long days, they rise three times and sleep three times. Purple swallows fly and dance back and forth, slender and swaying gracefully in the wind to win my affection." },
        { no: 12, luck: "下下籤", title: "蜃樓海市", poem: "假山假石假家園，那見真情向你言。<br>每事唯憑神點化，莫因浮慕錯流連。", trans: "Fake hills, fake stones, and a fake homestead; where can you find true feelings spoken to you? In every matter, rely only on divine enlightenment; do not linger mistakenly due to superficial admiration." },
        { no: 13, luck: "中平籤", title: "孟浩然尋梅", poem: "嶺南初放一枝梅，片片晶瑩入酒杯。<br>卻遇騎驢人早至，兒童背負占春魁。", trans: "A single branch of plum blossoms opens for the first time in Lingnan, its crystal-clear petals falling into the wine cup. Yet an early rider on a donkey arrives, with a child carrying it on his back to claim the crown of spring." },
        { no: 14, luck: "中平籤", title: "陶淵明醉酒", poem: "物情舒泰即春迴，隨意青雲步履台。<br>世事如棋局局新，何須計較惹塵埃。", trans: "When things become comfortable and relaxed, spring returns; stepping onto the high platform toward the blue clouds at will. World affairs are like a game of chess, completely fresh with every match; why calculate and dispute to stir up dust?" },
        { no: 15, luck: "上吉籤", title: "唐明皇遊月殿", poem: "月鏡新磨大放光，冰輪常滿照東方。<br>敢將學問前朝比，不假修為自顯揚。", trans: "The newly polished moon mirror unleashes a great light; the ice wheel remains constantly full, illuminating the East. Daring to compare one's knowledge with past dynasties, it manifests itself naturally without relying on artificial effort." },
        { no: 16, luck: "中吉籤", title: "牧童歸家", poem: "天邊鴉背夕陽回，隴外兒童跨犢來。<br>羌笛頻吹聲切耳，短長腔調樂何哉。", trans: "Sunsets return upon the backs of crows at the sky's edge; a child comes from beyond the ridges riding a calf. The Qiang flute blows repeatedly with sharp sounds striking the ear; short and long melodies bring such boundless joy." },
        { no: 17, luck: "中平籤", title: "月光圓滿", poem: "月亮光華滿大川，此時景物最堪憐。<br>佳人玩賞思明德，百福駢臻萬事全。", trans: "The brilliant moon illuminates the great rivers; at this time, the scenery is most worthy of affection. A beautiful lady admires it while reflecting on bright virtue; a hundred blessings arrive together, and all things are fulfilled." },
        { no: 18, luck: "下下籤", title: "杜鵑", poem: "秋水伊人各一方，天南地北恨偏長。<br>相思詩句憑誰寄，不盡淒涼幾斷腸。", trans: "The autumn waters separate the loved ones on different sides; across heaven's south and earth's north, the sorrow runs exceptionally long. Upon whom can one rely to send poems of longing? The endless desolation almost breaks the heart." },
        { no: 19, luck: "中吉籤", title: "伏羲畫八卦", poem: "天與厥因事可期，重重喜事自相宜。<br>守時不用多憂慮，若問前程萬事知。", trans: "Heaven provides the underlying causes, so events can be expected; layers of happy events naturally suit one another. Observe the right timing without excessive worry; if you ask about the future, all matters shall be known." },
        { no: 20, luck: "中平籤", title: "天上仙花", poem: "天上仙花難問種，人間塵事幾多更。<br>前程已註公私簿，罰賞分明濁與清。", trans: "It is hard to ask how celestial flowers are planted in heaven; how many changes occur in the dusty affairs of human world? The future is already recorded in public and private ledgers; punishments and rewards are distinct, just like the muddy and the clear." },
        { no: 21, luck: "中吉籤", title: "吳隱之會宴", poem: "天外紅霞如抹錦，檻邊桃杏鬭新粧。<br>盈眸爛熳誰居首，美酒頻斟且酌量。", trans: "Red clouds beyond the sky look like brushed brocade; beside the railings, peaches and apricots compete in their fresh makeup. With brilliant colors filling the eyes, who shall rank first? Pour the fine wine repeatedly and weigh your choices carefully." },
        { no: 22, luck: "下下籤", title: "他鄉作客", poem: "衰草殘陽客遠行，投荒萬里聽秋聲。<br>寒衣未疊重重恨，何處關山聽玉箏。", trans: "Withered grass and a setting sun accompany a traveler on a long journey, heading into a desolate wilderness ten thousand miles away to listen to autumn sounds. Winter clothes are not yet folded amidst layers of regret; at which mountain pass can one hear the jade zither?" },
        { no: 23, luck: "中平籤", title: "夢中得寶", poem: "手持一杯出東牆，路遇高人引進房。<br>開口便知奇異事，原來夢境未尋常。", trans: "Holding a cup while walking out from the eastern wall, meeting a person of high caliber on the road who leads you into a room. As soon as they speak, strange and wondrous things are revealed; it turns out this dream world is far from ordinary." },
        { no: 24, luck: "下下籤", title: "秦瓊賣馬", poem: "英雄落魄到天涯，馬瘦毛長路轉賒。<br>莫向眾人談命運，且將寶劍換生涯。", trans: "A hero loses his fortune and ends up at the edge of the world; with a thin horse and long fur, the road ahead becomes even more distant. Do not talk about destiny to the crowd; for now, exchange your precious sword to maintain your livelihood." },
        { no: 25, luck: "上吉籤", title: "五岳泰山", poem: "群山擾擾朝中岳，有似為臣列鵠班。<br>拱立兩行齊整肅，自居此地豈無歡。", trans: "The bustling mountains all pay homage to the Central Peak, resembling ministers standing in orderly ranks like geese. Standing respectfully in two perfectly neat rows; residing in this place, how could there not be joy?" },
        { no: 26, luck: "中平籤", title: "水月鏡花", poem: "淨瓶甘露洗凡塵，直教心地永無垠。<br>因何踏破雙鞋底，萬里尋求一處真。", trans: "Sweet dew from a pure vase washes away worldly dust, directly causing the inner heart to expand without boundaries. Why wear out the soles of both shoes, searching across ten thousand miles for a single place of truth?" },
        { no: 27, luck: "慢中平籤", title: "蟻子知時", poem: "蟻子搬家晴必雨，知時預備免憂愁。<br>目前雖見多勞碌，日後方知好計謀。", trans: "When ants move their home, a sunny day will surely turn to rain; knowing the time and preparing beforehand keeps worry away. Although much busy toil is seen at present, only later will you realize it was an excellent strategy." },
        { no: 28, luck: "中平籤", title: "白司馬被貶", poem: "楓葉紛紛落滿船，潯陽江上客遲留。<br>商女琵琶彈一曲，不知聽者幾多愁。", trans: "Maple leaves flutter down continuously to fill the boat; on the Xunyang River, the traveler lingers late. The merchant woman plays a single tune on the pipa; one knows not how much sorrow the listeners endure." },
        { no: 29, luck: "中吉籤", title: "王羲之賞菊", poem: "百草凋零獨耐寒，籬邊點綴玉欄杆。<br>高人品格同清秀，不共凡花一處看。", trans: "While all plants wither, it alone endures the cold, decorating the jade railings beside the fence. A person of high caliber shares its pure and elegant character, never to be viewed in the same place as common flowers." },
        { no: 30, luck: "下下籤", title: "貴妃受劫", poem: "馬嵬坡下草茫茫，今日猶聞說太真。<br>當日六軍同駐馬，萬金何處保全身。", trans: "Below the Mawei Slope, the wild grass stretches boundlessly; even today, one still hears stories of Yang Guifei. On that day, the six armies halted their horses together; where could ten thousand gold pieces go to preserve a life?" },
